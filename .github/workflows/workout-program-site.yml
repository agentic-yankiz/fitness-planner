# Lint, validate, build, and deploy the static fitness site to fly.io
# Triggered ONLY via workflow_dispatch (manual).
# Push auto-deploy is currently suspended — uncomment the push trigger below to re-enable.
name: Workout Program Site

on:
  workflow_dispatch:
  # Suspended: uncomment to auto-deploy on changes to the site or PLAN.md
  # push:
  #   branches: [main]
  #   paths:
  #     - "site/**"
  #     - "PLAN.md"
  #     - ".github/workflows/workout-program-site.yml"

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2@0.17.2 '**/*.md' '#node_modules'

  build:
    name: Build Site
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ github.sha }}
      build_time: ${{ steps.build-time.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get build timestamp
        id: build-time
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: node build.mjs
        working-directory: site
        env:
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ steps.build-time.outputs.value }}

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [lint, build]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flyctl
        run: curl -L https://fly.io/install.sh | sh
        env:
          FLYCTL_INSTALL: /usr/local

      - name: Deploy to Fly.io
        run: |
          /usr/local/bin/flyctl deploy \
            --config site/fly.toml \
            --dockerfile site/Dockerfile \
            --build-arg "GIT_SHA=${{ needs.build.outputs.git_sha }}" \
            --build-arg "BUILD_TIME=${{ needs.build.outputs.build_time }}" \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    continue-on-error: true
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@fc15c1d3d842244108df56739f1379f3b91e2c25  # v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Fitness Site Deployment
            Status: ${{ needs.deploy.result }}
            Version: ${{ needs.build.outputs.git_sha }}
            URL: https://shaked-workout.fly.dev/
            Time: ${{ needs.build.outputs.build_time }}
