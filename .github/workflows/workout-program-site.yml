# Validate the static fitness site. Deployment is intentionally local-only:
# the laptop launchd service fast-forwards main, rebuilds, serves with Caddy,
# and exposes /fitness through Tailscale Serve.
name: Workout Program Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "PLAN.md"
      - "tracking/**"
      - ".github/workflows/workout-program-site.yml"
  pull_request:
    paths:
      - "site/**"
      - "PLAN.md"
      - "tracking/**"
      - ".github/workflows/workout-program-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get build timestamp
        id: build-time
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site
        env:
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ steps.build-time.outputs.value }}
